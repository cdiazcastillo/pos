<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentasCAF - PÁGINA DE PRUEBA</title>
    <style>
        /* --- General & Variables --- */
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
            --light-gray: #f8f9fa;
            --dark-gray: #343a40;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            background-color: var(--light-gray);
            color: var(--dark-gray);
        }

        /* --- Main Layout --- */
        #pos-container {
            height: var(--app-height);
            display: flex;
            flex-direction: column;
        }

        #sales-interface {
            display: flex;
            flex-grow: 1;
        }

        #product-grid {
            flex: 2;
            min-height: 0; /* Flexbox bug fix */
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            overflow-y: auto;
        }

        #cart {
            flex: 1;
            background-color: #fff;
            border-left: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        /* --- Product Cards & Semaphore --- */
        .product-card {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            background-color: var(--primary-color);
            color: white;
            position: relative;
                overflow: hidden;
                display: flex;            flex-direction: column;
            justify-content: center;
                align-items: center;
                padding: 10px;
                width: 140px;
                    height: 140px;
                    margin: 7.5px;
                }        .product-card.stock-empty {
            cursor: not-allowed;
            background-color: var(--secondary-color);
        }

        /* --- Cart --- */
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .cart-header h2 { margin: 0; font-size: 1.5rem; }
        #cart-items { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; align-items: center; }
        .cart-item-name { flex-grow: 1; }
        .cart-item-price { font-weight: 600; }
        .remove-item-btn { cursor: pointer; color: var(--danger-color); background: none; border: none; font-size: 1rem; }
        #cart-summary { border-top: 1px solid #eee; padding-top: 10px; margin-top: auto; }
        .summary-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .summary-row.total { font-weight: bold; font-size: 1.2rem; border-top: 2px solid #333; padding-top: 8px; margin-top: 5px; }
        #cart-actions { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .action-btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: 600; text-align: center; }
        .action-btn.primary { background-color: var(--primary-color); color: white; }
        .action-btn.secondary { background-color: var(--secondary-color); color: white; }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            #sales-interface {
                flex-direction: column;
                height: 100%; /* Explicitly define height for flex children context */
                min-height: 0; /* Flexbox bug fix */
            }
            #product-grid {
                flex: 2;
                min-height: 0; /* Flexbox bug fix */
            }
            #cart {
                border-left: none;
                border-top: 1px solid #dee2e6;
                flex: 1;
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div id="pos-container">
        <main id="sales-interface">
            <!-- Product Grid -->
            <div id="product-grid">
                <!-- Static product examples for testing layout -->
                <div class="product-card stock-ok" data-id="1" data-name="Producto 1" data-price="1000"><div><span class="product-name">Producto 1</span></div></div>
                <div class="product-card stock-ok" data-id="2" data-name="Producto 2" data-price="1500"><div><span class="product-name">Producto 2</span></div></div>
                <div class="product-card stock-ok" data-id="3" data-name="Producto 3" data-price="2000"><div><span class="product-name">Producto 3</span></div></div>
                <div class="product-card stock-low" data-id="4" data-name="Producto 4" data-price="500"><div><span class="product-name">Producto 4</span></div></div>
                <div class="product-card stock-empty" data-id="5" data-name="Producto 5" data-price="1200"><div><span class="product-name">Producto 5</span></div></div>
                <div class="product-card stock-ok" data-id="6" data-name="Producto 6" data-price="1000"><div><span class="product-name">Producto 6</span></div></div>
                <div class="product-card stock-ok" data-id="7" data-name="Producto 7" data-price="1500"><div><span class="product-name">Producto 7</span></div></div>
                <div class="product-card stock-ok" data-id="8" data-name="Producto 8" data-price="2000"><div><span class="product-name">Producto 8</span></div></div>
                <div class="product-card stock-ok" data-id="9" data-name="Producto 9" data-price="500"><div><span class="product-name">Producto 9</span></div></div>
                <div class="product-card stock-ok" data-id="10" data-name="Producto 10" data-price="1200"><div><span class="product-name">Producto 10</span></div></div>
            </div>

            <!-- Cart Section -->
            <aside id="cart">
                <div class="cart-header">
                    <h2>Carrito</h2>
                </div>
                <div id="cart-items">
                     <div class="cart-item"><span class="cart-item-name">Producto 1</span><span class="cart-item-qty">x2</span><span class="cart-item-price">$2000</span><button class="remove-item-btn" data-id="1">&times;</button></div>
                     <div class="cart-item"><span class="cart-item-name">Producto 4</span><span class="cart-item-qty">x1</span><span class="cart-item-price">$500</span><button class="remove-item-btn" data-id="4">&times;</button></div>
                </div>
                <div id="cart-summary">
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="cart-total">$2500</span>
                    </div>
                </div>
                <div id="cart-actions">
                    <button id="cash-payment-btn" class="action-btn primary">Pago en Efectivo</button>
                    <button id="clear-cart-btn" class="action-btn secondary">Limpiar Carrito</button>
                </div>
            </aside>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Responsive Height Fix for iOS VH bug ---
            const setAppHeight = () => {
                const doc = document.documentElement;
                doc.style.setProperty('--app-height', `${window.innerHeight}px`);
            };
            window.addEventListener('resize', setAppHeight);
            window.addEventListener('orientationchange', setAppHeight);
            setAppHeight(); // Set initial value

            // Note: Cart functionality is minimal in this test file
            // The purpose is to validate the layout, not the full app logic.
        });
    </script>
</body>
</html>
